id: kotlin-coroutines-foundations
title: Kotlin Coroutines Foundations
track: kotlin
section: coroutines
difficulty: foundation
status: review
estimated_minutes: 180
content_version: 1
prerequisites:
  - android-app-architecture-foundations
  - android-viewmodel-and-ui-state
  - android-lifecycle-and-state-restoration
learning_outcomes:
  - Distinguish a cancellable coroutine computation from the thread that executes it.
  - Explain suspension, continuation, and resumption without assuming background execution.
  - Distinguish CoroutineScope, CoroutineContext, Job, Dispatcher, and Thread responsibilities.
  - Explain why every coroutine lifetime needs a deliberate owner.
  - Select Main, Default, or IO according to UI, CPU, and blocking-work requirements.
  - Use launch for owned work and async for deliberate concurrent results.
  - Use withContext for sequential context changes without creating detached work.
  - Distinguish sequential, concurrent, and potentially parallel execution.
  - Distinguish thread blocking from coroutine suspension.
  - Design CPU work and exception handling to cooperate with cancellation.
  - Explain foundational parent-child completion, cancellation, and failure behavior.
  - Bind Android coroutine work to ViewModel, lifecycle, or Compose ownership.
  - Preserve UI, Domain, and Data layer boundaries across suspend contracts.
  - Test delay, ordering, concurrency, and cancellation with controlled virtual time.
  - Recognize unmanaged scopes, forgotten Deferred values, blocking Main, and swallowed cancellation.
