summary: A responsibility-first foundation for coroutine execution, suspension, dispatchers, cancellation, Android scopes, layer boundaries, and virtual-time tests.
android_connections:
  - Android UI work must not block the Main thread.
  - ViewModel and lifecycle scopes bind coroutine cancellation to UI ownership.
  - Data implementations select appropriate execution for blocking or CPU-intensive work.
  - Suspend and Flow contracts cross layers without exposing thread management to UI.
  - Correctly scoped coroutine cancellation follows the lifecycle owner.
