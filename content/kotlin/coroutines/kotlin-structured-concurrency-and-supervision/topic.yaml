summary: An ownership-first guide to Job trees, fail-fast and supervised concurrency, partial success, timeout, cleanup, long-lived Android work, and deterministic tests.
android_connections:
  - ViewModel-owned Job trees cancel screen work when the ViewModel is cleared.
  - Supervision can isolate independent UI sections only when every failure is observed and represented.
  - Application scopes require explicit process-lifetime ownership and do not provide durable scheduling.
  - WorkManager is the boundary for reliable work that must persist beyond ordinary in-process coroutine ownership.
  - Data and Domain operations expose completion and cancellation through bounded suspend contracts.
