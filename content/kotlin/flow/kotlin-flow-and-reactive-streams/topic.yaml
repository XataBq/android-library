id: kotlin-flow-and-reactive-streams
title: Kotlin Flow and Reactive Streams
track: kotlin
section: flow
difficulty: foundation
status: review
estimated_minutes: 210
content_version: 1
prerequisites:
  - kotlin-coroutines-foundations
  - kotlin-structured-concurrency-and-supervision
learning_outcomes:
  - Distinguish a one-shot suspend result from an asynchronous stream of values.
  - Explain cold and hot stream behavior and predict when upstream work starts.
  - Build and collect a cold Flow with cancellation-aware suspending code.
  - Distinguish intermediate pipeline operators from terminal collection operators.
  - Use map, filter, transform, and onEach according to their contracts.
  - Explain Flow context preservation and place flowOn at the responsible upstream boundary.
  - Translate expected upstream failures without swallowing cancellation or downstream exceptions.
  - Apply bounded retry with explicit failure, attempt, backoff, and ownership policy.
  - Select buffer, conflate, or collectLatest according to value-loss and cancellation semantics.
  - Distinguish combine, zip, and merge through snapshot, pairing, and interleaving behavior.
  - Use flatMapLatest when a new selector makes previous stream work obsolete.
  - Distinguish StateFlow, SharedFlow, and Channel delivery contracts.
  - Model current observable state with an immutable StateFlow.
  - Configure SharedFlow replay, buffer, overflow, and subscriber timing deliberately.
  - Explain Channel rendezvous, buffering, and competing-receiver behavior.
  - Convert cold streams with stateIn or shareIn under an explicit owner scope.
  - Select Eagerly, Lazily, or WhileSubscribed from actual sharing lifetime requirements.
  - Collect Android UI streams with repeatOnLifecycle or collectAsStateWithLifecycle.
  - Preserve Data, optional Domain, ViewModel, and UI ownership across Flow boundaries.
  - Test finite cold streams and infinite hot streams deterministically.
  - Recognize duplicate cold collection, global event buses, mutable-flow exposure, and unbounded retry.
  - Justify a reactive pipeline from its start, cancellation, loss, sharing, and delivery semantics.
