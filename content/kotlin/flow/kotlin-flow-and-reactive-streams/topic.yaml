summary: An ownership-first guide to cold and hot Flow semantics, operators, sharing, lifecycle-aware collection, architecture boundaries, and deterministic tests.
android_connections:
  - ViewModel-owned StateFlow exposes presentation state while repositories retain ownership of application data.
  - Fragment Views collect with viewLifecycleOwner and repeatOnLifecycle so collection follows the rendered View lifetime.
  - Compose collects observable state with collectAsStateWithLifecycle.
  - Data and optional Domain layers expose immutable Flow contracts without depending on UI lifecycle types.
  - stateIn and shareIn require scopes whose lifetimes match the state or shared resource they own.
