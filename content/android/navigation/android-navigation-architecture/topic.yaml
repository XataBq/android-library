summary: An ownership-first guide to Android navigation state, routes, scopes, results, external entry points, restoration, and architecture-focused testing.
android_connections:
  - A UI or navigation host owns NavController and executes framework navigation.
  - ViewModel may expose presentation intent or an explicitly governed effect but never retains NavController.
  - NavBackStackEntry supplies lifecycle, saved state, and ViewModel ownership for one entry.
  - Repositories remain authoritative owners of application data reconstructed from route identifiers.
  - Compose and Fragment destinations share the same ownership model despite different APIs.
