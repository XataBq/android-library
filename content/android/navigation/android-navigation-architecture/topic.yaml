learning_outcomes:
  - Explain navigation as back-stack state rather than a collection of screen-changing commands.
  - Distinguish a destination, route, graph, back-stack entry, and current destination.
  - Keep NavController and framework navigation execution in the UI or navigation host.
  - Model business decisions and presentation navigation requests without making repositories navigate.
  - Predict push, pop, top-entry, removal, and recreation effects on navigation state.
  - Distinguish system Back from hierarchical Up behavior.
  - Pass small route inputs and reload authoritative data by stable identifier.
  - Use type-safe route APIs when supported by the installed Navigation version.
  - Place back-stack, saved, presentation, and application data in their responsible owners.
  - Choose an explicit delivery and acknowledgement policy for one-off navigation effects.
  - Apply popUpTo, inclusive, launchSingleTop, saveState, and restoreState intentionally.
  - Use nested graphs for navigation structure without equating them automatically with business modules.
  - Select destination, graph, or Activity ViewModel scope from the required lifetime.
  - Preserve independent histories for top-level destinations with multiple back stacks.
  - Compare saved-state results, Fragment Result API, shared ViewModel, callbacks, and repository-mediated results.
  - Validate explicit deep links, implicit deep links, and reconstructed routes.
  - Treat app links and exported entry points as untrusted inputs requiring authorization.
  - Rebuild screen data after process recreation from small saved inputs and repositories.
  - Keep Compose and Fragment navigation behind testable UI boundaries.
  - Test graphs, back stacks, results, and deep links independently from visual rendering.
