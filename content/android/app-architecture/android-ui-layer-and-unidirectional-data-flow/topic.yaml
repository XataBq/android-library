summary: A responsibility-first guide to producing, modeling, observing, and restoring Android UI state with Unidirectional Data Flow.
android_connections:
  - Android UI components can be recreated independently of the state they display.
  - Lifecycle-aware observation and explicit restoration requirements keep rendering aligned with the active UI.
