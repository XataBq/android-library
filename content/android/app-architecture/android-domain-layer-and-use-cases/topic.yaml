id: android-domain-layer-and-use-cases
title: Android Domain Layer and Use Cases
track: android
section: app-architecture
difficulty: foundation
status: review
estimated_minutes: 120
content_version: 1
prerequisites:
  - android-app-architecture-foundations
  - android-ui-layer-and-unidirectional-data-flow
  - android-data-layer-repositories-and-synchronization
learning_outcomes:
  - Explain the purpose and boundaries of an optional Domain layer.
  - Decide when a Domain layer is justified and when it adds unnecessary indirection.
  - Distinguish UI logic, application logic, and Data-layer responsibilities.
  - Design focused use cases around coherent application operations.
  - Coordinate multiple repositories without exposing data-source details.
  - Keep Domain code independent from Android framework and UI lifecycle types.
  - Select suspend functions or Flow according to operation semantics and caller ownership.
  - Model inputs, outputs, and failures at an appropriate application boundary.
  - Decide whether logic belongs in a ViewModel, repository, or use case.
  - Evaluate when layer-specific models improve a complex application.
  - Test Domain rules and repository coordination with fakes.
  - Recognize pass-through, oversized, duplicated, and infrastructure-leaking use cases.
