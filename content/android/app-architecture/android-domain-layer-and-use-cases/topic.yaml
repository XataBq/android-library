summary: A responsibility-first guide to deciding when an optional Domain layer and focused use cases improve an Android application.
android_connections:
  - Domain code can isolate reusable application rules from Android UI lifecycle concerns.
  - ViewModels may call use cases while continuing to own screen UI state and UI actions.
  - Use cases may coordinate repositories without accessing Room, Retrofit, or platform APIs directly.
  - Coroutines and Flow can cross the boundary while lifecycle collection remains in UI-owned scopes.
