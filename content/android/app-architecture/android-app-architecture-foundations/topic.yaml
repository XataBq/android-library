id: android-app-architecture-foundations
title: Android App Architecture Foundations
track: android
section: app-architecture
difficulty: foundation
status: review
estimated_minutes: 90
content_version: 1
prerequisites: []
learning_outcomes:
  - Explain why Android framework components should not own application data.
  - Distinguish the responsibilities of the UI, Data, and optional Domain layers.
  - Explain how separation of concerns limits the effects of change.
  - Analyze dependency direction and data flow in a layered Android application.
  - Explain how a Single Source of Truth protects data consistency.
  - Explain how Unidirectional Data Flow connects state, user actions, and data changes.
  - Identify misplaced responsibilities in Android-oriented scenarios.
  - Justify an architecture boundary using lifecycle, consistency, and complexity constraints.
tags:
  - app-architecture
  - separation-of-concerns
  - single-source-of-truth
  - unidirectional-data-flow
