summary: A reasoning-first introduction to responsibility boundaries, dependency direction, data ownership, and state flow in modern Android applications.
android_connections:
  - Android framework components have system-controlled lifecycles, so they are unsuitable owners of application data.
  - Configuration changes and process removal make explicit state ownership and recovery boundaries necessary.
