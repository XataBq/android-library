summary: A responsibility-first guide to repository boundaries, source-of-truth decisions, freshness, and local/remote synchronization in Android applications.
android_connections:
  - Android applications often coordinate persistent local data with remote or platform data sources under unreliable connectivity.
  - Repository boundaries let UI and optional Domain code use application data without depending on storage or transport APIs.
