id: android-data-layer-repositories-and-synchronization
title: Android Data Layer, Repositories, and Synchronization
track: android
section: app-architecture
difficulty: foundation
status: review
estimated_minutes: 150
content_version: 1
prerequisites:
  - android-app-architecture-foundations
  - android-ui-layer-and-unidirectional-data-flow
learning_outcomes:
  - Explain the responsibilities and boundaries of the Data layer.
  - Distinguish repositories from data sources.
  - Identify the authoritative owner for a piece of application data.
  - Trace read and write paths across local and remote sources.
  - Compare network-first, cache-first, and local-first read strategies.
  - Evaluate freshness, refresh, and invalidation policies.
  - Design a basic offline-capable synchronization flow.
  - Analyze retry, conflict, and partial-failure behavior.
  - Justify model boundaries across transport, persistence, application, and UI concerns.
  - Evaluate repository granularity and responsibility leaks.
