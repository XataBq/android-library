summary: A responsibility-first guide to ViewModel scope, coherent UI state, Flow sharing, lifecycle collection, restoration, and testing.
android_connections:
  - ViewModelStoreOwner scope controls how long a ViewModel and its in-memory screen state survive.
  - ViewModel preserves in-memory state through configuration changes but not system-initiated process death.
  - SavedStateHandle can retain small recoverable inputs while repositories reload authoritative application data.
  - Compose and View-based UIs collect state according to their own lifecycle.
  - ViewModel coordinates UI scenarios without owning Activity, Fragment, View, NavController, or Compose runtime state.
