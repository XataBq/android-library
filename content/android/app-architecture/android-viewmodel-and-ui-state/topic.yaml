id: android-viewmodel-and-ui-state
title: Android ViewModel and UI State
track: android
section: app-architecture
difficulty: foundation
status: review
estimated_minutes: 180
content_version: 1
prerequisites:
  - android-app-architecture-foundations
  - android-ui-layer-and-unidirectional-data-flow
  - android-data-layer-repositories-and-synchronization
  - android-domain-layer-and-use-cases
learning_outcomes:
  - Explain ViewModel as a scoped screen-level state holder and UI-scenario coordinator.
  - Select an appropriate ViewModelStoreOwner for screen, destination, graph, or Activity scope.
  - Distinguish configuration change, owner removal, and process death.
  - Design immutable, coherent UI state with explicit ownership.
  - Choose between one state object and multiple independent state streams.
  - Distinguish StateFlow, SharedFlow, Channel, and cold Flow contracts.
  - Model user actions, durable outcomes, and transient effects deliberately.
  - Apply atomic state updates and structured ViewModel coroutine ownership.
  - Prevent duplicate upstream collection with appropriate sharing.
  - Configure stateIn and SharingStarted according to subscriber behavior.
  - Keep lifecycle-aware collection in Compose or View UI ownership.
  - Use SavedStateHandle for small recoverable inputs and reload authoritative data.
  - Keep Android framework, navigation, Repository, and Domain responsibilities outside ViewModel ownership.
  - Test ViewModel state transitions, concurrency, restoration, and collection behavior with fakes.
