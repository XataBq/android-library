id: android-lifecycle-and-state-restoration
title: Android Lifecycle and State Restoration
track: android
section: app-architecture
difficulty: foundation
status: review
estimated_minutes: 180
content_version: 1
prerequisites:
  - android-app-architecture-foundations
  - android-ui-layer-and-unidirectional-data-flow
  - android-data-layer-repositories-and-synchronization
  - android-domain-layer-and-use-cases
  - android-viewmodel-and-ui-state
learning_outcomes:
  - Distinguish Activity, Fragment, and Fragment View lifecycles and their ownership boundaries.
  - Explain lifecycle callbacks as state transitions rather than persistence guarantees.
  - Distinguish configuration change, navigation removal, explicit finish, process termination, and process recreation.
  - Bind Fragment View work and lifecycle-aware collection to viewLifecycleOwner.
  - Explain the purpose and limits of onSaveInstanceState and Saved State Registry.
  - Use SavedStateHandle for small recoverable inputs while repositories retain authoritative data ownership.
  - Distinguish View hierarchy restoration from application-data persistence.
  - Select remember, rememberSaveable, and Saver according to required Compose state lifetime.
  - Reconstruct ViewModel presentation state after process recreation.
  - Select destination or graph ownership for navigation state and ViewModels.
  - Compare Fragment Result API, shared ViewModel, and navigation saved-state results.
  - Explain practical Bundle, Parcel, Binder, Parcelable, and Serializable boundaries.
  - Prevent TransactionTooLargeException by transporting only small reconstructable values.
  - Place state according to ownership, scope, size, durability, and reconstructability.
  - Test recreation and restoration without claiming that recreation fully simulates an OS process kill.
