summary: A responsibility-first guide to Android component lifecycles, small saved state, process recreation, navigation ownership, and Binder transport limits.
android_connections:
  - Activity, Fragment, and Fragment View lifecycles define different UI ownership boundaries.
  - ViewModel retains in-memory presentation state through configuration change but not process termination.
  - SavedStateHandle and saved-state APIs restore small reconstructable state rather than authoritative application data.
  - Repository and persistent storage retain ownership of durable or authoritative data.
  - Compose and View-based UI use different restoration APIs under the same ownership and size principles.
  - Binder transaction size constrains Bundle-based state transport.
