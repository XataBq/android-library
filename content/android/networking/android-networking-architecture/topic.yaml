learning_outcomes:
  - Explain HTTP requests and responses through methods, targets, headers, status, and representations.
  - Use safe and idempotent method semantics when reasoning about retries.
  - Interpret status-code classes together with the API contract.
  - Keep service interfaces, HTTP clients, DTOs, serialization, and transport failures inside the Data layer.
  - Design a remote data source that confines raw network-library types.
  - Separate wire DTOs from application and presentation models.
  - Map missing, nullable, malformed, and evolving payload fields without violating domain invariants.
  - Expose stable repository contracts to UI, ViewModel, and optional Domain callers.
  - Distinguish connection, DNS, timeout, TLS, cancellation, HTTP, serialization, API, and domain failures.
  - Preserve CancellationException while translating expected networking failures.
  - Configure connect, read, write, and whole-call timeout policies deliberately.
  - Design bounded retry around failure type, idempotency, backoff, jitter, and operation identity.
  - Separate request decoration in interceptors from authentication challenge handling.
  - Coordinate concurrent token refresh without recursive refresh or duplicate requests.
  - Explain TLS server identity, certificate chains, hostname validation, and trust configuration.
  - Treat certificate pinning as an advanced operational trade-off rather than a default.
  - Distinguish HTTP caching from repository or database caching and offline-first coordination.
  - Explain why connectivity signals do not guarantee endpoint reachability.
  - Design page, offset, and cursor pagination with refresh, deduplication, cancellation, and end detection.
  - Stream large uploads and downloads with bounded memory, progress, cancellation, and storage ownership.
  - Log request identifiers and timings without leaking tokens, credentials, or personal data.
  - Test service, serialization, mapper, data-source, repository, retry, authentication, and cancellation boundaries.
