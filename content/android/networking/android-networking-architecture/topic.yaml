summary: A boundary-first guide to HTTP, DTO mapping, resilient repository networking, authentication, TLS, caching, pagination, file transfer, and layered tests.
android_connections:
  - UI and ViewModel depend on repository contracts rather than Retrofit, OkHttp, raw responses, or DTOs.
  - Data-layer remote sources own Android and library-specific network behavior.
  - Repository coordination decides how remote, local, cached, and offline data become application data.
  - Owner-scoped coroutines cancel suspend network calls and must preserve CancellationException.
  - Android Network Security Configuration expresses platform trust and cleartext policy without leaking into domain models.
