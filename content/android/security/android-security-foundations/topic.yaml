summary: A threat-model-driven guide to Android component, data, identity, network, build, privacy, and verification boundaries.
android_connections:
  - Android application components and links are operating-system entry points whose exposure and input contracts must be explicit.
  - Repositories retain data ownership while enforcing local storage, network, token, and redaction policy at trusted boundaries.
  - Navigation validates route shape, while session and resource authorization remain application and server responsibilities.
  - Dependency injection makes security-sensitive clients, clocks, token stores, and policy boundaries explicit and testable.
  - Lifecycle and restoration behavior affect screenshots, recents, clipboard, sessions, backups, and cleanup.
