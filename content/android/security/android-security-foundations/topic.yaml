  - android-testing-foundations
learning_outcomes:
  - Define confidentiality, integrity, availability, privacy, authenticity, and accountability goals for an Android feature.
  - Identify assets, attackers, entry points, trust boundaries, and abuse cases with a lightweight threat model.
  - Apply defense in depth without treating any client-side control as absolute.
  - Distinguish authentication, authorization, operating-system permissions, and risk signals.
  - Minimize Android component exposure and validate every externally supplied value.
  - Handle intents, deep links, and verified App Links as untrusted requests until application policy accepts them.
  - Request the least Android permission at the moment its protected capability is needed.
  - Select private storage according to data sensitivity, sharing, lifetime, backup, and deletion requirements.
  - Explain what Android Keystore protects and what it cannot protect.
  - Use encryption at rest as one layer with explicit key, plaintext, metadata, migration, and recovery policy.
  - Explain why secrets embedded in an APK are extractable and move authoritative secrets to trusted systems.
  - Preserve platform TLS validation and configure Android network trust deliberately.
  - Evaluate certificate pinning only against a concrete threat model and operational recovery plan.
  - Design token and session handling around server-side authorization, expiry, revocation, and redaction.
  - Use biometrics or device credentials for local user-presence and key-use gates without treating them as remote authorization.
  - Harden WebView boundaries or replace them with a safer external-browser flow.
  - Prevent sensitive-data leakage through logs, analytics, crash reports, clipboard, screenshots, recents, notifications, and temporary files.
  - Configure and test backup and restore policy for sensitive and session-bound data.
  - Reduce build, dependency, signing, and release-configuration risk.
  - Treat app and device integrity verdicts as replay-bound risk inputs rather than authorization decisions.
  - Design negative security tests for components, links, permissions, storage, network trust, logs, and restoration.
  - Recognize security anti-patterns and maintain a repeatable review checklist.
