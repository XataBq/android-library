summary: An ownership-first guide to explicit dependency graphs, composition roots, Android lifetimes, framework automation, binding selection, and isolated tests.
android_connections:
  - Application, Activity, Fragment, ViewModelStoreOwner, and NavBackStackEntry provide different graph ownership boundaries.
  - Hilt components automate Android-aware construction but do not select correct application boundaries or lifetimes.
  - ViewModels receive repository and use-case contracts without retaining UI framework owners.
  - Application Context may support Data-layer platform adapters while Activity or themed Context stays UI-scoped.
  - Test graphs replace bindings without mutating process-global production state.
