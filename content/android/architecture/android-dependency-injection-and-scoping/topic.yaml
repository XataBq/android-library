learning_outcomes:
  - Explain dependency injection as explicit object construction, replacement, and ownership.
  - Apply dependency inversion so policy depends on stable abstractions rather than infrastructure.
  - Prefer constructor injection for complete objects with visible dependencies.
  - Identify the application or feature composition root that assembles an object graph.
  - Trace graph nodes, dependency edges, transitive creation, reuse, and cycles.
  - Distinguish dependency injection from global service lookup.
  - Build a small manual dependency container before selecting framework automation.
  - Explain what compile-time and runtime DI frameworks automate and what architecture decisions remain human-owned.
  - Distinguish provider, lazy, factory, scoped reuse, and unscoped creation semantics.
  - Define every scope through an owner, creation boundary, reuse boundary, and destruction boundary.
  - Explain why an unscoped object still has an owner and finite reachability.
  - Distinguish process/Application, Activity, Activity-retained, Fragment, ViewModel, and navigation-entry lifetimes.
  - Inject ViewModel dependencies without retaining Activity, Fragment, View, NavController, or themed Context.
  - Use SavedStateHandle for restorable inputs and assisted factories for deliberate runtime values.
  - Use qualifiers for bindings with the same type but different semantics.
  - Use set or map multibindings for unordered contributions with explicit selection policy.
  - Keep application, Activity, and themed Context dependencies narrow and correctly scoped.
  - Detect graph cycles, over-scoping, mutable globals, giant modules, and container leakage.
  - Replace constructor dependencies directly in unit tests and graph bindings in integration tests.
  - Keep Domain and repository contracts free from DI-container and Android framework APIs.
