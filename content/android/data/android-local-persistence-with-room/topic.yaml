summary: A data-modeling and ownership guide to Room entities, DAO contracts, Flow observation, transactions, relations, migrations, offline coordination, and verification.
android_connections:
  - Room keeps durable structured data independent from Activity, Fragment, ViewModel, and process lifetimes.
  - Repositories expose application models and own local/remote policy while Room entities and DAOs remain in the Data layer.
  - Flow DAO queries can feed repository streams while lifecycle-aware collection remains owned by ViewModel and UI scopes.
  - Dependency injection owns one application-context database instance per process and supplies focused DAOs or local sources.
  - Android backup, app-private storage, process death, and device SQLite versions affect persistence policy and testing.
