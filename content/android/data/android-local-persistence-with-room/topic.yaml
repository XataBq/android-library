learning_outcomes:
  - Explain when local persistence is justified and when memory or saved state is sufficient.
  - Explain Room's role as an abstraction over SQLite without hiding relational design.
  - Design entities with deliberate nullability, defaults, names, and schema stability.
  - Distinguish database entities, network DTOs, domain models, and UI models.
  - Design use-case-oriented DAO contracts instead of exposing generic CRUD.
  - Select suspend and Flow-returning DAO methods according to one-shot or observable semantics.
  - Explain invalidation-driven observable query re-execution and collection ownership.
  - Use transactions for bounded multi-step atomic database work.
  - Distinguish database transactions from coroutine Mutex synchronization.
  - Model one-to-one, one-to-many, and many-to-many relationships deliberately.
  - Use foreign keys, junction tables, embedded objects, and projections according to query needs.
  - Use type converters only for values that belong in one column.
  - Select stable natural, surrogate, remote, composite, and temporary identities.
  - Add uniqueness and indices according to constraints and measured query patterns.
  - Own one process-level Room database through dependency injection without leaking Activity Context.
  - Explain schema versions, exported schemas, migration paths, and release discipline.
  - Design and test manual migrations that preserve and transform existing data.
  - Explain auto-migration capabilities, version requirements, and ambiguity limits.
  - Restrict destructive migration to explicitly disposable data.
  - Coordinate local and remote sources through explicit repository source-of-truth and freshness policy.
  - Model pending writes, synchronization state, idempotency, and conflict decisions.
  - Test and measure DAO, transaction, migration, repository, performance, security, and backup behavior.
