learning_outcomes:
  - Explain which regression risk, contract, or user-observable behavior a test protects.
  - Distinguish unit, integration, component, UI, instrumentation, and end-to-end boundaries.
  - Choose the smallest reliable test that can expose the target failure.
  - Balance speed, realism, diagnostic value, and maintenance in a test portfolio.
  - Structure focused tests with Arrange, Act, and Assert when that improves clarity.
  - Distinguish state verification, interaction verification, and observable-behavior assertions.
  - Select dummies, stubs, fakes, spies, and mocks according to the controlled dependency.
  - Prefer behavior-rich fakes over brittle call verification when stateful behavior matters.
  - Improve testability with explicit dependencies, clocks, dispatchers, boundaries, and owners.
  - Test pure rules, mappers, reducers, use cases, and state machines without Android.
  - Test ViewModel initial state, actions, transitions, cancellation, and saved inputs.
  - Control coroutine scheduling and virtual time with one shared test scheduler.
  - Test finite cold Flow and infinite StateFlow or SharedFlow contracts without hanging.
  - Test repository coordination with deterministic remote and local fakes.
  - Verify serialization, mapping, status, timeout, retry, and cancellation at the network boundary.
  - Verify DAO queries, transactions, cleanup, and migrations at the database boundary.
  - Test navigation callbacks separately and graph behavior through a test controller.
  - Assert Compose and View UI through stable user-facing semantics and synchronization.
  - Test lifecycle recreation without confusing it with process death.
  - Prevent flakiness caused by real time, shared state, races, unstable selectors, and leaked resources.
  - Explain the strengths and limits of snapshot or golden tests.
  - Design a risk-based, isolated, and maintainable Android test portfolio.
