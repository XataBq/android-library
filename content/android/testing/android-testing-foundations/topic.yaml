summary: A risk-first guide to Android test boundaries, deliberate doubles, deterministic coroutine and Flow tests, observable UI behavior, and isolated test portfolios.
android_connections:
  - Android architecture exposes constructor, repository, ViewModel, navigation, and UI seams at different test boundaries.
  - Local JVM and instrumented device execution are environments, not synonyms for unit and end-to-end scope.
  - ViewModel, coroutine, and Flow tests control owner lifetime and scheduling rather than waiting on real time.
  - Compose semantics and Espresso matchers express user-observable UI contracts through framework synchronization.
  - Room, network, navigation, lifecycle, and Hilt integrations require focused boundary tests without turning every check into end-to-end coverage.
